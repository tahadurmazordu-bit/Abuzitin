<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haftasonu Planı</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            margin: 0;
            overflow: hidden; /* Buton ekran dışına kaçmasın diye */
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #2c3e50; font-size: 24px; }
        .buttons {
            margin-top: 40px;
            position: relative;
            height: 60px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: transform 0.2s;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            transition: 0.1s; /* Kaçış hızı */
        }
        #yesBtn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    <h1 id="question">2 hafta sonraki haftasonu boş musun? 🚲</h1>
    <div class="buttons">
        <button id="yesBtn" onclick="celebrate()">Evet</button>
        <button id="noBtn" onmouseover="moveButton()">Hayır</button>
    </div>
</div>

<script>
    function moveButton() {
        // Ekran sınırlarını hesapla
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        
        const noBtn = document.getElementById('noBtn');
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
        noBtn.style.position = 'fixed'; // Tüm ekranda kaçabilmesi için
    }

    function celebrate() {
        document.getElementById('question').innerHTML = "Tamam o zaman, bisiklet sürecez! 🏁🚲";
        document.querySelector('.buttons').style.display = 'none';
    }
</script>

</body>
</html>
